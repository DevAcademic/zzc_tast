<!DOCTYPE html><html lang="ar" dir="rtl"><head>    <meta charset="UTF-8" />    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    <title>تسجيل الدخول / إنشاء حساب</title>    <!-- ===== Supabase SDK (مرة واحدة فقط) ===== -->    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js">    </script>    <style>        /* ============================================================           RESET & BASE           ============================================================ */        * {            margin: 0;            padding: 0;            box-sizing: border-box;            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;        }        body {            min-height: 100vh;            display: flex;            align-items: center;            justify-content: center;            background: linear-gradient(145deg, #f0f4ff 0%, #e8edf8 100%);            padding: 20px;            position: relative;            overflow-x: hidden;        }        /* ===== خلفية متحركة ===== */        .bg-shapes {            position: fixed;            top: 0;            left: 0;            width: 100%;            height: 100%;            overflow: hidden;            z-index: 0;            pointer-events: none;        }        .bg-shapes .shape {            position: absolute;            border-radius: 50%;            opacity: 0.15;            animation: floatShape 20s ease-in-out infinite alternate;        }        .bg-shapes .shape:nth-child(1) {            width: 500px;            height: 500px;            background: linear-gradient(135deg, #818cf8, #6366f1);            top: -150px;            right: -150px;            animation-duration: 25s;            animation-delay: 0s;        }        .bg-shapes .shape:nth-child(2) {            width: 400px;            height: 400px;            background: linear-gradient(135deg, #a78bfa, #7c3aed);            bottom: -100px;            left: -100px;            animation-duration: 20s;            animation-delay: 3s;        }        .bg-shapes .shape:nth-child(3) {            width: 200px;            height: 200px;            background: linear-gradient(135deg, #60a5fa, #3b82f6);            top: 50%;            left: 50%;            transform: translate(-50%, -50%);            animation-duration: 30s;            animation-delay: 1.5s;            opacity: 0.08;        }        @keyframes floatShape {            0% {                transform: translate(0, 0) scale(1) rotate(0deg);            }            33% {                transform: translate(30px, -40px) scale(1.05) rotate(5deg);            }            66% {                transform: translate(-20px, 30px) scale(0.95) rotate(-3deg);            }            100% {                transform: translate(15px, -15px) scale(1.02) rotate(2deg);            }        }        /* ============================================================           CARD           ============================================================ */        .auth-card {            position: relative;            z-index: 1;            width: 100%;            max-width: 460px;            background: rgba(255, 255, 255, 0.75);            backdrop-filter: blur(24px);            -webkit-backdrop-filter: blur(24px);            border-radius: 32px;            padding: 44px 36px 38px;            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.12), 0 8px 24px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.6);            border: 1px solid rgba(255, 255, 255, 0.4);            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;            animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;            transform: translateY(30px);            opacity: 0;        }        @keyframes cardAppear {            0% {                transform: translateY(30px) scale(0.96);                opacity: 0;            }            100% {                transform: translateY(0) scale(1);                opacity: 1;            }        }        .auth-card:hover {            box-shadow: 0 30px 80px rgba(99, 102, 241, 0.18), 0 8px 24px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.6);            transform: translateY(-2px);        }        /* ===== الشعار ===== */        .auth-card .logo-wrapper {            display: flex;            align-items: center;            justify-content: center;            gap: 10px;            margin-bottom: 4px;        }        .auth-card .logo-icon {            width: 48px;            height: 48px;            background: linear-gradient(135deg, #6366f1, #8b5cf6);            border-radius: 16px;            display: flex;            align-items: center;            justify-content: center;            font-size: 24px;            color: #fff;            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);            animation: pulseGlow 3s ease-in-out infinite;        }        @keyframes pulseGlow {            0%,            100% {                box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);            }            50% {                box-shadow: 0 8px 40px rgba(99, 102, 241, 0.5);            }        }        .auth-card h1 {            text-align: center;            font-size: 26px;            font-weight: 800;            color: #1e1b4b;            letter-spacing: -0.5px;            margin-bottom: 2px;        }        .auth-card h1 span {            background: linear-gradient(135deg, #6366f1, #8b5cf6);            -webkit-background-clip: text;            -webkit-text-fill-color: transparent;            background-clip: text;        }        .auth-card .subtitle {            text-align: center;            color: #6b7280;            font-size: 14px;            font-weight: 400;            margin-bottom: 6px;        }        .auth-card .supabase-info {            text-align: center;            color: #8b5cf6;            font-size: 12px;            font-weight: 500;            margin-bottom: 22px;            background: rgba(139, 92, 246, 0.08);            padding: 4px 16px;            border-radius: 20px;            display: inline-block;            width: auto;            margin-left: auto;            margin-right: auto;            letter-spacing: 0.3px;        }        /* ============================================================           TABS           ============================================================ */        .tabs {            display: flex;            background: rgba(99, 102, 241, 0.06);            border-radius: 16px;            padding: 4px;            margin-bottom: 28px;            border: 1px solid rgba(99, 102, 241, 0.08);        }        .tab-btn {            flex: 1;            padding: 12px 0;            border: none;            background: transparent;            color: #9ca3af;            font-size: 15px;            font-weight: 600;            border-radius: 12px;            cursor: pointer;            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);            position: relative;        }        .tab-btn::after {            content: '';            position: absolute;            bottom: 4px;            left: 50%;            transform: translateX(-50%) scaleX(0);            width: 30px;            height: 3px;            background: linear-gradient(135deg, #6366f1, #8b5cf6);            border-radius: 4px;            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);        }        .tab-btn.active {            background: #ffffff;            color: #1e1b4b;            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.12);        }        .tab-btn.active::after {            transform: translateX(-50%) scaleX(1);        }        .tab-btn:hover:not(.active) {            color: #4b5563;        }        /* ============================================================           FORMS           ============================================================ */        .form-container {            display: none;            animation: slideFade 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);        }        .form-container.active {            display: block;        }        @keyframes slideFade {            0% {                opacity: 0;                transform: translateY(16px) scale(0.98);            }            100% {                opacity: 1;                transform: translateY(0) scale(1);            }        }        .form-group {            margin-bottom: 18px;            position: relative;        }        .form-group label {            display: block;            color: #374151;            font-size: 13px;            font-weight: 600;            margin-bottom: 5px;            letter-spacing: 0.2px;        }        .form-group label .required {            color: #ef4444;            margin-right: 2px;        }        .form-group input {            width: 100%;            padding: 14px 18px;            background: #f8fafc;            border: 2px solid #e5e7eb;            border-radius: 14px;            color: #1e1b4b;            font-size: 15px;            outline: none;            transition: all 0.3s ease;            font-weight: 500;        }        .form-group input::placeholder {            color: #b0b8c4;            font-weight: 400;        }        .form-group input:focus {            border-color: #818cf8;            background: #ffffff;            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);            transform: translateY(-1px);        }        .form-group input:hover:not(:focus) {            border-color: #c7d2fe;        }        .form-group input.error {            border-color: #ef4444;            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);        }        .form-group .input-icon {            position: absolute;            left: 16px;            top: 50%;            transform: translateY(-50%);            color: #9ca3af;            font-size: 18px;            pointer-events: none;            transition: color 0.3s ease;        }        .form-group input:focus~.input-icon {            color: #818cf8;        }        /* ============================================================           SUBMIT BTN           ============================================================ */        .submit-btn {            width: 100%;            padding: 16px;            border: none;            border-radius: 14px;            font-size: 16px;            font-weight: 700;            color: #fff;            background: linear-gradient(135deg, #6366f1, #8b5cf6);            cursor: pointer;            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);            margin-top: 4px;            position: relative;            overflow: hidden;            letter-spacing: 0.3px;        }        .submit-btn::before {            content: '';            position: absolute;            top: 0;            left: -100%;            width: 100%;            height: 100%;            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);            transition: left 0.6s ease;        }        .submit-btn:hover:not(:disabled)::before {            left: 100%;        }        .submit-btn:hover:not(:disabled) {            transform: translateY(-3px) scale(1.01);            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.35);        }        .submit-btn:active:not(:disabled) {            transform: scale(0.97);            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.25);        }        .submit-btn:disabled {            opacity: 0.7;            cursor: not-allowed;            transform: none;            box-shadow: none;        }        .submit-btn .spinner {            display: none;            width: 22px;            height: 22px;            border: 3px solid rgba(255, 255, 255, 0.2);            border-top: 3px solid #fff;            border-radius: 50%;            animation: spin 0.7s linear infinite;            margin: 0 auto;        }        .submit-btn.loading .spinner {            display: block;        }        .submit-btn.loading .btn-text {            display: none;        }        @keyframes spin {            to {                transform: rotate(360deg);            }        }        /* ============================================================           MESSAGES           ============================================================ */        .message {            padding: 14px 18px;            border-radius: 12px;            font-size: 14px;            font-weight: 500;            margin-top: 16px;            display: none;            align-items: center;            gap: 10px;            animation: slideFade 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);        }        .message .msg-icon {            font-size: 18px;            flex-shrink: 0;        }        .message.error {            display: flex;            background: rgba(239, 68, 68, 0.08);            border: 1px solid rgba(239, 68, 68, 0.15);            color: #b91c1c;        }        .message.success {            display: flex;            background: rgba(34, 197, 94, 0.08);            border: 1px solid rgba(34, 197, 94, 0.15);            color: #15803d;        }        .message.info {            display: flex;            background: rgba(59, 130, 246, 0.08);            border: 1px solid rgba(59, 130, 246, 0.15);            color: #1d4ed8;        }        /* ============================================================           FOOTER           ============================================================ */        .auth-footer {            text-align: center;            margin-top: 24px;            color: #9ca3af;            font-size: 14px;        }        .auth-footer a {            color: #6366f1;            text-decoration: none;            font-weight: 600;            transition: all 0.3s ease;            position: relative;        }        .auth-footer a::after {            content: '';            position: absolute;            bottom: -2px;            left: 0;            width: 0;            height: 2px;            background: linear-gradient(135deg, #6366f1, #8b5cf6);            transition: width 0.3s ease;        }        .auth-footer a:hover::after {            width: 100%;        }        .auth-footer a:hover {            color: #4f46e5;        }        /* ============================================================           RESPONSIVE           ============================================================ */        @media (max-width: 520px) {            .auth-card {                padding: 32px 20px 28px;                border-radius: 24px;            }            .auth-card h1 {                font-size: 22px;            }            .auth-card .logo-icon {                width: 40px;                height: 40px;                font-size: 20px;            }            .tab-btn {                font-size: 13px;                padding: 10px 0;            }            .form-group input {                padding: 12px 16px;                font-size: 14px;            }            .submit-btn {                padding: 14px;                font-size: 15px;            }            .bg-shapes .shape:nth-child(1) {                width: 300px;                height: 300px;                top: -100px;                right: -100px;            }            .bg-shapes .shape:nth-child(2) {                width: 250px;                height: 250px;                bottom: -80px;                left: -80px;            }        }        @media (max-width: 380px) {            .auth-card {                padding: 24px 14px 20px;                border-radius: 20px;            }            .auth-card h1 {                font-size: 20px;            }            .tab-btn {                font-size: 12px;                padding: 8px 0;            }            .form-group input {                padding: 10px 14px;                font-size: 13px;            }        }        /* ===== حماية إضافية: منع تحديد النص ===== */        body {            -webkit-user-select: none;            -moz-user-select: none;            -ms-user-select: none;            user-select: none;        }        /* ===== منع السحب على الصور ===== */        img {            -webkit-user-drag: none;            user-drag: none;        }        /* ===== منع النقر المزدوج ===== */        .no-dblclick {            user-select: none;        }    </style></head><body>    <!-- ===== خلفية متحركة ===== -->    <div class="bg-shapes">        <div class="shape"></div>        <div class="shape"></div>        <div class="shape"></div>    </div>    <!-- ============================================================ -->    <!--                     CARD تسجيل الدخول / إنشاء حساب             -->    <!-- ============================================================ -->    <div class="auth-card" id="authCard">        <div class="logo-wrapper">            <div class="logo-icon">📚</div>        </div>        <h1>ديف <span>أكاديمي</span></h1>        <p class="subtitle">سجل الدخول أو أنشئ حساباً جديداً</p>        <div style="text-align:center;">            <span class="supabase-info" id="supabaseInfo">🔄 جارِ الاتصال...</span>        </div>        <!-- ===== TABS ===== -->        <div class="tabs" role="tablist">            <button class="tab-btn active" data-tab="login" role="tab">🔐 تسجيل الدخول</button>            <button class="tab-btn" data-tab="signup" role="tab">📝 إنشاء حساب</button>        </div>        <!-- ===== FORM: تسجيل الدخول ===== -->        <div class="form-container active" id="loginForm" role="tabpanel">            <form id="loginFormElement" novalidate>                <div class="form-group">                    <label for="loginEmail">📧 البريد الإلكتروني <span class="required">*</span></label>                    <input type="email" id="loginEmail" placeholder="example@email.com" required autocomplete="email" />                </div>                <div class="form-group">                    <label for="loginPassword">🔑 كلمة المرور <span class="required">*</span></label>                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />                </div>                <button type="submit" class="submit-btn" id="loginBtn">                    <span class="btn-text">🚀 تسجيل الدخول</span>                    <span class="spinner"></span>                </button>            </form>            <div class="message" id="loginMessage"></div>        </div>        <!-- ===== FORM: إنشاء حساب ===== -->        <div class="form-container" id="signupForm" role="tabpanel">            <form id="signupFormElement" novalidate>                <div class="form-group">                    <label for="signupName">👤 الاسم الكامل <span class="required">*</span></label>                    <input type="text" id="signupName" placeholder="أحمد محمد" required autocomplete="name" />                </div>                <div class="form-group">                    <label for="signupEmail">📧 البريد الإلكتروني <span class="required">*</span></label>                    <input type="email" id="signupEmail" placeholder="example@email.com" required autocomplete="email" />                </div>                <div class="form-group">                    <label for="signupPassword">🔑 كلمة المرور <span class="required">*</span></label>                    <input type="password" id="signupPassword" placeholder="•••••••• (٦ أحرف على الأقل)" required autocomplete="new-password" minlength="6" />                </div>                <button type="submit" class="submit-btn" id="signupBtn">                    <span class="btn-text">✨ إنشاء حساب</span>                    <span class="spinner"></span>                </button>            </form>            <div class="message" id="signupMessage"></div>        </div>        <div class="auth-footer">            <span id="footerText">ليس لديك حساب؟ <a href="#" id="switchToSignup">أنشئ حساباً</a></span>        </div>    </div>    <!-- ============================================================ -->    <!--                     JAVASCRIPT                                 -->    <!-- ============================================================ -->    <script>        /* ===================================================================           🛡️  الطبقة الأولى: الحماية الشاملة من أدوات المطورين           =================================================================== */        // 1. منع F12، Ctrl+Shift+I، Ctrl+Shift+J، Ctrl+U        document.addEventListener('keydown', function(e) {            // F12            if (e.key === 'F12' || e.keyCode === 123) {                e.preventDefault();                e.stopPropagation();                return false;            }            // Ctrl+Shift+I (أداة المطورين)            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) {                e.preventDefault();                e.stopPropagation();                return false;            }            // Ctrl+Shift+J (console)            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) {                e.preventDefault();                e.stopPropagation();                return false;            }            // Ctrl+U (view source)            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {                e.preventDefault();                e.stopPropagation();                return false;            }            // Ctrl+S (save page)            if (e.ctrlKey && (e.key === 'S' || e.key === 's' || e.keyCode === 83)) {                e.preventDefault();                e.stopPropagation();                return false;            }            // Ctrl+Shift+C (inspect element)            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c' || e.keyCode === 67)) {                e.preventDefault();                e.stopPropagation();                return false;            }            return true;        });        // 2. منع النقر بزر الماوس الأيمن (قائمة السياق)        document.addEventListener('contextmenu', function(e) {            e.preventDefault();            e.stopPropagation();            return false;        });        // 3. منع السحب والإفلات (لحماية الملفات)        document.addEventListener('dragstart', function(e) {            e.preventDefault();            e.stopPropagation();            return false;        });        document.addEventListener('drop', function(e) {            e.preventDefault();            e.stopPropagation();            return false;        });        // 4. كشف أدوات المطورين عبر حجم النافذة (debugger detection)        // هذه الطريقة تكتشف عندما تكون أداة المطورين مفتوحة        (function detectDevTools() {            let devtoolsOpen = false;            const threshold = 160; // فرق الحجم الذي يشير إلى وجود أدوات المطورين            function checkDevTools() {                const widthDiff = window.outerWidth - window.innerWidth;                const heightDiff = window.outerHeight - window.innerHeight;                // إذا كان الفرق كبيراً جداً، فهذا يشير إلى وجود أدوات المطورين                if (widthDiff > threshold || heightDiff > threshold) {                    if (!devtoolsOpen) {                        devtoolsOpen = true;                        // إعادة توجيه أو مسح الصفحة                        document.body.innerHTML =                            '<div style="text-align:center;padding:50px;font-size:24px;color:#ef4444;">⚠️ تم تعطيل أدوات المطورين لأسباب أمنية</div>';                        document.body.style.background = '#f8fafc';                        setTimeout(function() {                            window.location.href = 'about:blank';                        }, 1000);                    }                } else {                    devtoolsOpen = false;                }            }            // التحقق كل 500 مللي ثانية            setInterval(checkDevTools, 500);            // التحقق عند تغيير حجم النافذة            let resizeTimer;            window.addEventListener('resize', function() {                clearTimeout(resizeTimer);                resizeTimer = setTimeout(checkDevTools, 200);            });        })();        // 5. منع استخدام console.log وغيرها (لحماية المعلومات الحساسة)        // حفظ المراجع الأصلية        const originalConsoleLog = console.log;        const originalConsoleWarn = console.warn;        const originalConsoleError = console.error;        const originalConsoleInfo = console.info;        // استبدال الدوال بأخرى فارغة في الإنتاج (مع إمكانية التفعيل للتصحيح)        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {            console.log = function() {};            console.warn = function() {};            console.info = function() {};            // نترك console.error للضرورة ولكن نمنع عرض التفاصيل الحساسة            console.error = function() {};        }        // 6. منع الوصول إلى عناصر DOM عبر الأدوات (حماية إضافية)        // إخفاء الـ DOM من خلال عدم السماح بالتعديل على الـ prototype        Object.defineProperty(document, 'cookie', {            get: function() {                return '';            },            set: function() {                return '';            }        });        // 7. منع فتح الـ console من خلال اختصار Ctrl+` (بعض المتصفحات)        document.addEventListener('keydown', function(e) {            if (e.ctrlKey && e.key === '`') {                e.preventDefault();                e.stopPropagation();                return false;            }            // منع Alt+Tab من فتح أدوات المطورين في بعض الحالات            if (e.altKey && (e.key === 'Tab' || e.keyCode === 9)) {                e.preventDefault();                e.stopPropagation();                return false;            }        });        // 8. منع النقر المزدوج على العناصر الحساسة        document.querySelectorAll('input, button, a').forEach(function(el) {            el.addEventListener('dblclick', function(e) {                e.preventDefault();                e.stopPropagation();                return false;            });        });        // 9. منع استخدام الـ console من خلال الـ iframe (حماية إضافية)        if (window.console && window.console.clear) {            console.clear();        }        // 10. منع التحديد (selection) في الصفحة        document.addEventListener('selectstart', function(e) {            e.preventDefault();            e.stopPropagation();            return false;        });        /* ===================================================================           🔒  تكوين Supabase           =================================================================== */        const SUPABASE_URL = 'https://mgcljgrkxhyjjmxqjkti.supabase.co';        const SUPABASE_ANON_KEY = 'sb_publishable_TE4fMQARKZb0XcjhAnEJhA_ws6AUxoi';        /* ===================================================================           🔒  تهيئة Supabase – مرة واحدة فقط           =================================================================== */        let supabaseClient = null;        if (window.supabase) {            if (!window._supabaseClient) {                window._supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);            }            supabaseClient = window._supabaseClient;        }        const supabaseInfo = document.getElementById('supabaseInfo');        if (supabaseInfo) {            if (supabaseClient) {                supabaseInfo.textContent = '✅ الخدمة جاهزة';                supabaseInfo.style.color = '#22c55e';            } else {                supabaseInfo.textContent = '⚠️ لم يتم تحميل الخدمة';                supabaseInfo.style.color = '#ef4444';            }        }        /* ===================================================================           📦  عناصر DOM           =================================================================== */        const tabs = document.querySelectorAll('.tab-btn');        const loginContainer = document.getElementById('loginForm');        const signupContainer = document.getElementById('signupForm');        const loginForm = document.getElementById('loginFormElement');        const signupForm = document.getElementById('signupFormElement');        const loginBtn = document.getElementById('loginBtn');        const signupBtn = document.getElementById('signupBtn');        const loginMsg = document.getElementById('loginMessage');        const signupMsg = document.getElementById('signupMessage');        const footerText = document.getElementById('footerText');        /* ===================================================================           🔄  تبديل التبويبات           =================================================================== */        function switchTab(tabId) {            tabs.forEach(btn => {                btn.classList.toggle('active', btn.dataset.tab === tabId);            });            loginContainer.classList.toggle('active', tabId === 'login');            signupContainer.classList.toggle('active', tabId === 'signup');            loginMsg.className = 'message';            loginMsg.textContent = '';            signupMsg.className = 'message';            signupMsg.textContent = '';            if (tabId === 'login') {                footerText.innerHTML =                    'ليس لديك حساب؟ <a href="#" id="switchToSignup">أنشئ حساباً</a>';                document.getElementById('switchToSignup')?.addEventListener('click', (e) => {                    e.preventDefault();                    switchTab('signup');                });            } else {                footerText.innerHTML =                    'لديك حساب بالفعل؟ <a href="#" id="switchToLogin">سجل الدخول</a>';                document.getElementById('switchToLogin')?.addEventListener('click', (e) => {                    e.preventDefault();                    switchTab('login');                });            }        }        tabs.forEach(btn => {            btn.addEventListener('click', () => {                switchTab(btn.dataset.tab);            });        });        // تعيين التبويب الافتراضي        switchTab('login');        /* ===================================================================           💬  عرض الرسائل           =================================================================== */        function showMessage(element, message, type = 'error') {            const icons = {                error: '❌',                success: '✅',                info: 'ℹ️'            };            element.className = `message ${type}`;            element.innerHTML = `<span class="msg-icon">${icons[type] || '📌'}</span> ${message}`;        }        function clearMessage(element) {            element.className = 'message';            element.textContent = '';        }        /* ===================================================================           ⏳  حالة الزر (تحميل / عادي)           =================================================================== */        function setLoading(btn, loading) {            if (loading) {                btn.classList.add('loading');                btn.disabled = true;            } else {                btn.classList.remove('loading');                btn.disabled = false;            }        }        /* ===================================================================           ✅  التحقق من صحة البريد الإلكتروني           =================================================================== */        function isValidEmail(email) {            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);        }        /* ===================================================================           🔐  تسجيل الدخول           =================================================================== */        loginForm.addEventListener('submit', async (e) => {            e.preventDefault();            clearMessage(loginMsg);            const email = document.getElementById('loginEmail').value.trim();            const password = document.getElementById('loginPassword').value;            if (!email || !password) {                showMessage(loginMsg, 'يرجى ملء جميع الحقول.', 'error');                return;            }            if (!isValidEmail(email)) {                showMessage(loginMsg, 'البريد الإلكتروني غير صحيح.', 'error');                return;            }            if (password.length < 6) {                showMessage(loginMsg, 'كلمة المرور يجب أن تكون ٦ أحرف على الأقل.', 'error');                return;            }            setLoading(loginBtn, true);            try {                if (!supabaseClient) {                    showMessage(loginMsg, '⚠️ الخدمة غير متوفرة. تأكد من اتصال الإنترنت.', 'error');                    setLoading(loginBtn, false);                    return;                }                const { data, error } = await supabaseClient.auth.signInWithPassword({                    email,                    password,                });                if (error) throw error;                if (data?.user) {                    localStorage.setItem('devAcademicUser', JSON.stringify({                        email,                        name: data.user.user_metadata?.full_name || null                    }));                    showMessage(loginMsg, 'تم تسجيل الدخول بنجاح، جارِ التوجيه...', 'success');                    setTimeout(() => {                        window.location.href = 'dashboard.html';                    }, 800);                } else {                    showMessage(loginMsg, 'حدث خطأ غير متوقع. حاول مجدداً.', 'error');                }            } catch (err) {                console.error('Login error:', err);                if (err.message.includes('Invalid login credentials')) {                    showMessage(loginMsg, 'البريد الإلكتروني أو كلمة المرور غير صحيحة.', 'error');                } else if (err.message.includes('Email not confirmed')) {                    showMessage(loginMsg, 'يرجى تأكيد بريدك الإلكتروني أولاً.', 'info');                } else {                    showMessage(loginMsg, `${err.message || 'حدث خطأ، حاول مجدداً.'}`, 'error');                }            } finally {                setLoading(loginBtn, false);            }        });        /* ===================================================================           📝  إنشاء حساب           =================================================================== */        signupForm.addEventListener('submit', async (e) => {            e.preventDefault();            clearMessage(signupMsg);            const name = document.getElementById('signupName').value.trim();            const email = document.getElementById('signupEmail').value.trim();            const password = document.getElementById('signupPassword').value;            if (!name || !email || !password) {                showMessage(signupMsg, 'يرجى ملء جميع الحقول.', 'error');                return;            }            if (name.length < 2) {                showMessage(signupMsg, 'الاسم يجب أن يكون حرفين على الأقل.', 'error');                return;            }            if (!isValidEmail(email)) {                showMessage(signupMsg, 'البريد الإلكتروني غير صحيح.', 'error');                return;            }            if (password.length < 6) {                showMessage(signupMsg, 'كلمة المرور يجب أن تكون ٦ أحرف على الأقل.', 'error');                return;            }            setLoading(signupBtn, true);            try {                if (!supabaseClient) {                    showMessage(signupMsg, '⚠️ الخدمة غير متوفرة. تأكد من اتصال الإنترنت.', 'error');                    setLoading(signupBtn, false);                    return;                }                const { data, error } = await supabaseClient.auth.signUp({                    email,                    password,                    options: {                        data: {                            full_name: name,                        },                    },                });                if (error) throw error;                if (data?.user) {                    localStorage.setItem('devAcademicUser', JSON.stringify({                        email,                        name                    }));                    if (data.user.confirmed_at === null) {                        showMessage(                            signupMsg,                            'تم إنشاء الحساب! يرجى تأكيد بريدك الإلكتروني عبر الرابط الذي أرسلناه لك.',                            'info'                        );                    } else {                        showMessage(signupMsg, 'تم إنشاء الحساب بنجاح! جارِ التوجيه...', 'success');                        setTimeout(() => {                            window.location.href = 'dashboard.html';                        }, 800);                    }                } else {                    showMessage(signupMsg, 'حدث خطأ غير متوقع. حاول مجدداً.', 'error');                }            } catch (err) {                console.error('Signup error:', err);                if (err.message.includes('User already registered')) {                    showMessage(signupMsg, 'هذا البريد الإلكتروني مسجل بالفعل.', 'error');                } else {                    showMessage(signupMsg, `${err.message || 'حدث خطأ، حاول مجدداً.'}`, 'error');                }            } finally {                setLoading(signupBtn, false);            }        });        /* ===================================================================           ⚡  التحقق من جلسة المستخدم عند تحميل الصفحة           =================================================================== */        (async function checkSession() {            try {                const storedUser = localStorage.getItem('devAcademicUser');                if (!supabaseClient && storedUser) {                    try {                        const user = JSON.parse(storedUser);                        if (user && user.email) {                            window.location.href = 'dashboard.html';                            return;                        }                    } catch (e) {                        localStorage.removeItem('devAcademicUser');                    }                    return;                }                if (!supabaseClient) return;                const { data: { session } } = await supabaseClient.auth.getSession();                if (session?.user) {                    window.location.href = 'dashboard.html';                } else {                    localStorage.removeItem('devAcademicUser');                }            } catch (_) {                localStorage.removeItem('devAcademicUser');            }        })();        console.log('✅ Auth page ready – Supabase initialized once.');        console.log('🎨 تصميم احترافي مع أنيميشن وألوان فاتحة مريحة');    </script></body></html>
