<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديف أكاديمي - لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #f0f4f8; }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .card:hover { transform: translateY(-2px); }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            padding: 24px;
        }
        .stat-card.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .teacher-item {
            cursor: pointer;
            transition: all 0.3s;
            border-right: 4px solid transparent;
        }
        .teacher-item:hover {
            background: #f8fafc;
            border-right-color: #667eea;
            transform: translateX(-4px);
        }
        .teacher-item.active {
            background: #eef2ff;
            border-right-color: #4f46e5;
        }
        .student-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 14px 18px;
            transition: all 0.2s;
            border-right: 3px solid #e2e8f0;
        }
        .student-item:hover {
            background: #f1f5f9;
            border-right-color: #667eea;
        }
        .slide-enter {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .badge-teacher {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
        }
        .empty-state {
            background: #f8fafc;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            border: 2px dashed #e2e8f0;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .direction-ltr { direction: ltr; }
    </style>
</head>
<body>

<div class="container mx-auto px-4 py-6 max-w-7xl">
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">
                <i class="fas fa-graduation-cap text-blue-600"></i> ديف أكاديمي
            </h1>
            <p class="text-gray-500 text-sm mt-1">لوحة تحكم المنصة</p>
        </div>
        <div class="flex items-center gap-3 mt-3 md:mt-0">
            <span class="text-sm bg-white px-4 py-2 rounded-full shadow-sm">
                <i class="fas fa-users text-blue-500"></i> <span id="totalUsers">0</span> مستخدم
            </span>
            <button onclick="refreshData()" class="bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700 transition text-sm">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
        </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="stat-card">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-white/80 text-sm">إجمالي المستخدمين</p>
                    <p class="text-3xl font-bold" id="totalUsersStat">0</p>
                </div>
                <i class="fas fa-users text-4xl text-white/30"></i>
            </div>
        </div>
        <div class="stat-card green">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-white/80 text-sm">المدرسون</p>
                    <p class="text-3xl font-bold" id="totalTeachersStat">0</p>
                </div>
                <i class="fas fa-chalkboard-teacher text-4xl text-white/30"></i>
            </div>
        </div>
        <div class="stat-card orange">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-white/80 text-sm">الطلاب المسجلين</p>
                    <p class="text-3xl font-bold" id="totalStudentsStat">0</p>
                </div>
                <i class="fas fa-user-graduate text-4xl text-white/30"></i>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loadingIndicator" class="text-center py-10">
        <div class="loading-spinner"></div>
        <p class="text-gray-500 mt-2">جاري تحميل البيانات...</p>
    </div>

    <!-- Content -->
    <div id="content" style="display:none;">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- قائمة المدرسين -->
            <div class="lg:col-span-1">
                <div class="card p-4 sticky top-4">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-gray-800">
                            <i class="fas fa-chalkboard-teacher text-green-600"></i> المدرسون
                        </h2>
                        <span class="text-sm text-gray-500" id="teachersCount">0</span>
                    </div>
                    <div id="teachersList" class="space-y-2 max-h-[600px] overflow-y-auto">
                        <!-- يتم التعبئة بواسطة JavaScript -->
                    </div>
                </div>
            </div>

            <!-- تفاصيل المدرس المختار -->
            <div class="lg:col-span-2">
                <div class="card p-4">
                    <div id="teacherDetails">
                        <!-- يتم التعبئة بواسطة JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // تكوين Supabase
    // ============================================================
    const SUPABASE_URL = 'https://mgcljgrkxhyjjmxqjkti.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TE4fMQARKZb0XcjhAnEJhA_ws6AUxoi';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ============================================================
    // المتغيرات العامة
    // ============================================================
    let allData = {
        users: [],
        teachers: [],
        userTeachers: []
    };
    let selectedTeacherId = null;

    // ============================================================
    // تحميل البيانات - فقط من قاعدة البيانات الفعلية
    // ============================================================
    async function loadData() {
        try {
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('content').style.display = 'none';

            console.log('🔄 جاري جلب البيانات من قاعدة البيانات...');

            // جلب جميع البيانات من قاعدة البيانات فقط
            const [usersRes, teachersRes, userTeachersRes] = await Promise.all([
                sb.from('users').select('*'),
                sb.from('teachers').select('*'),
                sb.from('user_teachers').select('*, users(full_name, email, phone), teachers(name, subject)')
            ]);

            // التحقق من الأخطاء
            if (usersRes.error) console.error('❌ خطأ في users:', usersRes.error);
            if (teachersRes.error) console.error('❌ خطأ في teachers:', teachersRes.error);
            if (userTeachersRes.error) console.error('❌ خطأ في user_teachers:', userTeachersRes.error);

            allData.users = usersRes.data || [];
            allData.teachers = teachersRes.data || [];
            allData.userTeachers = userTeachersRes.data || [];

            console.log(`✅ تم جلب ${allData.users.length} مستخدم، ${allData.teachers.length} مدرس، ${allData.userTeachers.length} علاقة`);

            // تحديث الإحصائيات
            updateStats();

            // عرض المدرسين
            renderTeachers();

            // إذا كان هناك مدرسين وليس لدينا مدرس محدد، اختر الأول
            if (allData.teachers.length > 0 && !selectedTeacherId) {
                selectedTeacherId = allData.teachers[0].id;
                renderTeacherDetails(selectedTeacherId);
            } else if (allData.teachers.length === 0) {
                // لا يوجد مدرسين
                document.getElementById('teacherDetails').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-chalkboard-teacher text-4xl text-gray-300 mb-3"></i>
                        <p class="text-lg font-medium text-gray-600">لا يوجد مدرسين</p>
                        <p class="text-sm text-gray-400 mt-1">قم بإضافة مدرسين من لوحة الإدارة</p>
                        <p class="text-xs text-gray-400 mt-2">المدرسين الذين تضيفهم في قاعدة البيانات سيظهرون هنا تلقائياً</p>
                    </div>
                `;
            }

            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('content').style.display = 'block';

        } catch (error) {
            console.error('❌ خطأ في التحميل:', error);
            document.getElementById('loadingIndicator').innerHTML = `
                <div class="text-red-600 text-center p-8">
                    <i class="fas fa-exclamation-circle text-4xl mb-3"></i>
                    <p class="font-bold">حدث خطأ في تحميل البيانات</p>
                    <p class="text-sm text-gray-500 mt-2">${error.message}</p>
                    <button onclick="refreshData()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-redo"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        }
    }

    // ============================================================
    // تحديث الإحصائيات
    // ============================================================
    function updateStats() {
        const totalUsers = allData.users.length;
        const totalTeachers = allData.teachers.length;
        const studentsWithTeachers = new Set(allData.userTeachers.map(ut => ut.user_id));

        document.getElementById('totalUsersStat').textContent = totalUsers;
        document.getElementById('totalTeachersStat').textContent = totalTeachers;
        document.getElementById('totalStudentsStat').textContent = studentsWithTeachers.size;
        document.getElementById('totalUsers').textContent = totalUsers;
        document.getElementById('teachersCount').textContent = totalTeachers;
    }

    // ============================================================
    // عرض قائمة المدرسين (من قاعدة البيانات فقط)
    // ============================================================
    function renderTeachers() {
        const container = document.getElementById('teachersList');

        if (allData.teachers.length === 0) {
            container.innerHTML = `
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-chalkboard-teacher text-4xl mb-3 opacity-30"></i>
                    <p>لا يوجد مدرسين</p>
                    <p class="text-sm mt-1">قم بإضافة مدرسين في قاعدة البيانات</p>
                </div>
            `;
            return;
        }

        let html = '';
        allData.teachers.forEach(teacher => {
            const studentCount = allData.userTeachers.filter(ut => ut.teacher_id === teacher.id).length;
            const isActive = selectedTeacherId === teacher.id;

            html += `
                <div class="teacher-item p-3 rounded-xl ${isActive ? 'active' : ''}" 
                     onclick="selectTeacher('${teacher.id}')">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-600 flex-shrink-0">
                            <i class="fas fa-chalkboard-teacher"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-gray-800 truncate">${teacher.name}</p>
                            <p class="text-sm text-gray-500 truncate">${teacher.subject || 'مادة غير محددة'}</p>
                        </div>
                        <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-full text-xs font-bold flex-shrink-0">
                            ${studentCount}
                        </span>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // ============================================================
    // اختيار مدرس وعرض تفاصيله
    // ============================================================
    function selectTeacher(teacherId) {
        selectedTeacherId = teacherId;
        renderTeachers();
        renderTeacherDetails(teacherId);
    }

    // ============================================================
    // عرض تفاصيل المدرس والطلاب المسجلين عنده
    // ============================================================
    function renderTeacherDetails(teacherId) {
        const container = document.getElementById('teacherDetails');

        const teacher = allData.teachers.find(t => t.id === teacherId);
        if (!teacher) {
            container.innerHTML = `
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-exclamation-circle text-4xl mb-3"></i>
                    <p>لم يتم العثور على المدرس</p>
                </div>
            `;
            return;
        }

        const teacherStudents = allData.userTeachers.filter(ut => ut.teacher_id === teacherId);
        const students = teacherStudents.map(ut => ut.users).filter(s => s !== null);

        let html = `
            <div class="slide-enter">
                <div class="flex items-center gap-4 mb-6 pb-4 border-b">
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-green-600 text-2xl flex-shrink-0">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800">${teacher.name}</h2>
                        <div class="flex flex-wrap gap-2 mt-1">
                            ${teacher.subject ? `<span class="badge-teacher"><i class="fas fa-book"></i> ${teacher.subject}</span>` : ''}
                            <span class="badge-teacher"><i class="fas fa-user-graduate"></i> ${students.length} طالب</span>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-gray-700 mb-3">
                        <i class="fas fa-user-graduate text-blue-500"></i> الطلاب المسجلون
                    </h3>
        `;

        if (students.length === 0) {
            html += `
                <div class="empty-state">
                    <i class="fas fa-user-graduate text-4xl text-gray-300 mb-3"></i>
                    <p class="text-gray-500">لا يوجد طلاب مسجلين عند هذا المدرس</p>
                    <p class="text-sm text-gray-400 mt-1">عندما يقوم طالب بإدخال كود هذا المدرس، سيظهر هنا</p>
                </div>
            `;
        } else {
            html += `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            `;

            students.forEach((student, index) => {
                html += `
                    <div class="student-item slide-enter" style="animation-delay: ${index * 0.05}s">
                        <div class="flex items-start gap-3">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 flex-shrink-0">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="font-bold text-gray-800">${student.full_name || 'غير مسجل'}</p>
                                <div class="text-sm text-gray-500 space-y-1 mt-1">
                                    <div class="flex items-center gap-2">
                                        <i class="fas fa-envelope text-gray-400 w-4"></i>
                                        <span class="truncate direction-ltr">${student.email || '-'}</span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <i class="fas fa-phone text-gray-400 w-4"></i>
                                        <span class="direction-ltr">${student.phone || 'غير مسجل'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
        }

        html += `
                </div>
            </div>
        `;

        container.innerHTML = html;
    }

    // ============================================================
    // تحديث البيانات
    // ============================================================
    function refreshData() {
        document.getElementById('content').style.display = 'none';
        document.getElementById('loadingIndicator').style.display = 'block';
        loadData();
    }

    // ============================================================
    // تشغيل التطبيق
    // ============================================================
    loadData();

    // تحديث كل 30 ثانية
    setInterval(refreshData, 30000);
</script>

</body>
</html>
