<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديف أكاديمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="p-8" dir="rtl">
    <h1 class="text-3xl font-bold text-blue-600 mb-4">📊 ديف أكاديمي</h1>
    
    <div id="result" class="p-4 bg-gray-100 rounded-lg">
        ⏳ جاري الاتصال بقاعدة البيانات...
    </div>

    <div id="details" class="mt-4 p-4 bg-gray-50 rounded-lg text-sm hidden"></div>
</div>

<script>
    (async function() {
        const result = document.getElementById('result');
        const details = document.getElementById('details');
        
        try {
            result.innerHTML = '🔑 جاري تهيئة الاتصال...';
            
            // معلومات Supabase
            const SUPABASE_URL = 'https://mgcljgrkxhyjjmxqjkti.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_TE4fMQARKZb0XcjhAnEJhA_ws6AUxoi';
            
            // التحقق من المكتبة
            if (typeof supabase === 'undefined') {
                throw new Error('مكتبة Supabase غير محملة');
            }
            
            result.innerHTML = '✅ تم تحميل المكتبة، جاري الاتصال...';
            
            // إنشاء العميل
            const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            result.innerHTML = '📊 جاري جلب المستخدمين...';
            
            // محاولة جلب البيانات
            const { data, error, status } = await sb.from('users').select('*');
            
            // عرض النتيجة
            if (error) {
                details.classList.remove('hidden');
                details.innerHTML = `
                    <div class="text-red-600 font-bold">❌ فشل جلب البيانات</div>
                    <div class="mt-2"><strong>الخطأ:</strong> ${error.message}</div>
                    <div class="mt-1"><strong>الكود:</strong> ${error.code || 'غير معروف'}</div>
                    <div class="mt-1"><strong>الحالة:</strong> ${status || 'غير معروف'}</div>
                    <div class="mt-2 text-sm text-gray-600">${JSON.stringify(error, null, 2)}</div>
                `;
                result.innerHTML = '❌ فشل الاتصال بقاعدة البيانات';
                return;
            }
            
            // نجاح
            result.innerHTML = `✅ تم جلب ${data?.length || 0} مستخدم بنجاح!`;
            
            if (data && data.length > 0) {
                let table = '<table class="w-full border mt-4"><thead class="bg-gray-100"><tr>';
                table += '<th class="p-2 border">#</th>';
                table += '<th class="p-2 border">الاسم</th>';
                table += '<th class="p-2 border">البريد</th>';
                table += '<th class="p-2 border">الهاتف</th>';
                table += '<th class="p-2 border">تاريخ التسجيل</th></tr></thead><tbody>';
                
                data.forEach((user, i) => {
                    table += `<tr>
                        <td class="p-2 border">${i+1}</td>
                        <td class="p-2 border">${user.full_name || '-'}</td>
                        <td class="p-2 border">${user.email || '-'}</td>
                        <td class="p-2 border">${user.phone || '-'}</td>
                        <td class="p-2 border">${user.registered_at ? new Date(user.registered_at).toLocaleDateString('ar-EG') : '-'}</td>
                    </tr>`;
                });
                table += '</tbody></table>';
                details.classList.remove('hidden');
                details.innerHTML = table;
            } else {
                details.classList.remove('hidden');
                details.innerHTML = '⚠️ لا يوجد مستخدمين مسجلين في قاعدة البيانات';
            }
            
        } catch (err) {
            result.innerHTML = '❌ حدث خطأ';
            details.classList.remove('hidden');
            details.innerHTML = `
                <div class="text-red-600">${err.message || err}</div>
                <div class="mt-2 text-sm text-gray-600">${err.stack || ''}</div>
            `;
        }
    })();
</script>
</body>
</html>
