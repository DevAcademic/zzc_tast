<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ديف أكاديمي - تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f0f4ff 0%, #e8edf8 100%);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-shapes .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.12;
            animation: floatShape 20s ease-in-out infinite alternate;
        }

        .bg-shapes .shape:nth-child(1) {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #0EA5E9, #38BDF8);
            top: -150px;
            right: -150px;
            animation-duration: 25s;
        }

        .bg-shapes .shape:nth-child(2) {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #38BDF8, #7DD3FC);
            bottom: -100px;
            left: -100px;
            animation-duration: 20s;
            animation-delay: 3s;
        }

        .bg-shapes .shape:nth-child(3) {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #7DD3FC, #BAE6FD);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 30s;
            animation-delay: 1.5s;
            opacity: 0.06;
        }

        @keyframes floatShape {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            33% {
                transform: translate(30px, -40px) scale(1.05) rotate(5deg);
            }
            66% {
                transform: translate(-20px, 30px) scale(0.95) rotate(-3deg);
            }
            100% {
                transform: translate(15px, -15px) scale(1.02) rotate(2deg);
            }
        }

        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 40px 32px 36px;
            box-shadow: 0 20px 60px rgba(14, 165, 233, 0.12), 0 8px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: translateY(30px);
            opacity: 0;
        }

        @keyframes cardAppear {
            0% {
                transform: translateY(30px) scale(0.96);
                opacity: 0;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .auth-card .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .auth-card .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0EA5E9, #38BDF8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(14, 165, 233, 0.3);
        }

        .auth-card h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 900;
            color: #0C4A6E;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }

        .auth-card h1 span {
            color: #0EA5E9;
        }

        .auth-card .subtitle {
            text-align: center;
            color: #64748B;
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .auth-card .status-badge {
            text-align: center;
            color: #0EA5E9;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 22px;
            background: rgba(14, 165, 233, 0.08);
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        .tabs {
            display: flex;
            background: rgba(14, 165, 233, 0.06);
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid rgba(14, 165, 233, 0.08);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            color: #94A3B8;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 30px;
            height: 3px;
            background: linear-gradient(135deg, #0EA5E9, #38BDF8);
            border-radius: 4px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tab-btn.active {
            background: #ffffff;
            color: #0C4A6E;
            box-shadow: 0 4px 16px rgba(14, 165, 233, 0.12);
        }

        .tab-btn.active::after {
            transform: translateX(-50%) scaleX(1);
        }

        .tab-btn:hover:not(.active) {
            color: #475569;
        }

        .form-container {
            display: none;
            animation: slideFade 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .form-container.active {
            display: block;
        }

        @keyframes slideFade {
            0% {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #334155;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.2px;
        }

        .form-group label .required {
            color: #EF4444;
            margin-right: 2px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 14px;
            color: #0C4A6E;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .form-group input::placeholder {
            color: #94A3B8;
            font-weight: 400;
        }

        .form-group input:focus {
            border-color: #0EA5E9;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
            transform: translateY(-1px);
        }

        .form-group input:hover:not(:focus) {
            border-color: #BAE6FD;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #0EA5E9, #38BDF8);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .submit-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 40px rgba(14, 165, 233, 0.35);
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .submit-btn .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .submit-btn.loading .spinner {
            display: block;
        }
        .submit-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .message {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideFade 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .message .msg-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.error {
            display: flex;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: #B91C1C;
        }

        .message.success {
            display: flex;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.15);
            color: #15803D;
        }

        .message.info {
            display: flex;
            background: rgba(14, 165, 233, 0.08);
            border: 1px solid rgba(14, 165, 233, 0.15);
            color: #0284C7;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: #94A3B8;
            font-size: 14px;
        }

        .auth-footer a {
            color: #0EA5E9;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .auth-footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #0EA5E9, #38BDF8);
            transition: width 0.3s ease;
        }

        .auth-footer a:hover::after {
            width: 100%;
        }

        .auth-footer a:hover {
            color: #0284C7;
        }

        @media (max-width: 520px) {
            .auth-card {
                padding: 28px 18px 24px;
                border-radius: 24px;
            }
            .auth-card h1 {
                font-size: 22px;
            }
            .auth-card .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .tab-btn {
                font-size: 13px;
                padding: 10px 0;
            }
            .form-group input {
                padding: 12px 16px;
                font-size: 14px;
            }
            .submit-btn {
                padding: 14px;
                font-size: 15px;
            }
            .bg-shapes .shape:nth-child(1) {
                width: 300px;
                height: 300px;
                top: -100px;
                right: -100px;
            }
            .bg-shapes .shape:nth-child(2) {
                width: 250px;
                height: 250px;
                bottom: -80px;
                left: -80px;
            }
        }

        @media (max-width: 380px) {
            .auth-card {
                padding: 20px 12px 16px;
                border-radius: 20px;
            }
            .auth-card h1 {
                font-size: 20px;
            }
            .tab-btn {
                font-size: 12px;
                padding: 8px 0;
            }
            .form-group input {
                padding: 10px 14px;
                font-size: 13px;
            }
        }

        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        img {
            -webkit-user-drag: none;
            user-drag: none;
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="auth-card" id="authCard">
        <div class="logo-wrapper">
            <div class="logo-icon">📚</div>
        </div>
        <h1>ديف <span>أكاديمي</span></h1>
        <p class="subtitle">سجل الدخول أو أنشئ حساباً جديداً</p>
        <div style="text-align:center;">
            <span class="status-badge" id="supabaseStatus">🔄 جارِ الاتصال...</span>
        </div>

        <div class="tabs" role="tablist">
            <button class="tab-btn active" data-tab="login" role="tab">🔐 تسجيل الدخول</button>
            <button class="tab-btn" data-tab="signup" role="tab">📝 إنشاء حساب</button>
        </div>

        <div class="form-container active" id="loginForm" role="tabpanel">
            <form id="loginFormElement" novalidate>
                <div class="form-group">
                    <label for="loginEmail">📧 البريد الإلكتروني <span class="required">*</span></label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="loginPassword">🔑 كلمة المرور <span class="required">*</span></label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">
                    <span class="btn-text">🚀 تسجيل الدخول</span>
                    <span class="spinner"></span>
                </button>
            </form>
            <div class="message" id="loginMessage"></div>
        </div>

        <div class="form-container" id="signupForm" role="tabpanel">
            <form id="signupFormElement" novalidate>
                <div class="form-group">
                    <label for="signupName">👤 الاسم الكامل <span class="required">*</span></label>
                    <input type="text" id="signupName" placeholder="أحمد محمد" required autocomplete="name" />
                </div>
                <div class="form-group">
                    <label for="signupEmail">📧 البريد الإلكتروني <span class="required">*</span></label>
                    <input type="email" id="signupEmail" placeholder="example@email.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="signupPassword">🔑 كلمة المرور <span class="required">*</span></label>
                    <input type="password" id="signupPassword" placeholder="•••••••• (٦ أحرف على الأقل)" required autocomplete="new-password" minlength="6" />
                </div>
                <button type="submit" class="submit-btn" id="signupBtn">
                    <span class="btn-text">✨ إنشاء حساب</span>
                    <span class="spinner"></span>
                </button>
            </form>
            <div class="message" id="signupMessage"></div>
        </div>

        <div class="auth-footer">
            <span id="footerText">ليس لديك حساب؟ <a href="#" id="switchToSignup">أنشئ حساباً</a></span>
        </div>
    </div>

    <script>
        // ===== Supabase Config =====
        var SUPABASE_URL = 'https://mgcljgrkxhyjjmxqjkti.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_TE4fMQARKZb0XcjhAnEJhA_ws6AUxoi';

        var supabaseClient = null;
        if (window.supabase) {
            if (!window._supabaseClient) {
                window._supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            supabaseClient = window._supabaseClient;
        }

        var statusEl = document.getElementById('supabaseStatus');
        if (supabaseClient) {
            statusEl.textContent = '✅ الخدمة جاهزة';
            statusEl.style.color = '#22C55E';
        } else {
            statusEl.textContent = '⚠️ جارِ التحميل...';
            statusEl.style.color = '#F59E0B';
        }

        // ===== Tabs =====
        var tabs = document.querySelectorAll('.tab-btn');
        var loginContainer = document.getElementById('loginForm');
        var signupContainer = document.getElementById('signupForm');
        var loginForm = document.getElementById('loginFormElement');
        var signupForm = document.getElementById('signupFormElement');
        var loginBtn = document.getElementById('loginBtn');
        var signupBtn = document.getElementById('signupBtn');
        var loginMsg = document.getElementById('loginMessage');
        var signupMsg = document.getElementById('signupMessage');
        var footerText = document.getElementById('footerText');

        function switchTab(tabId) {
            tabs.forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.tab === tabId);
            });
            loginContainer.classList.toggle('active', tabId === 'login');
            signupContainer.classList.toggle('active', tabId === 'signup');
            loginMsg.className = 'message';
            loginMsg.textContent = '';
            signupMsg.className = 'message';
            signupMsg.textContent = '';

            if (tabId === 'login') {
                footerText.innerHTML = 'ليس لديك حساب؟ <a href="#" id="switchToSignup">أنشئ حساباً</a>';
                document.getElementById('switchToSignup')?.addEventListener('click', function(e) {
                    e.preventDefault();
                    switchTab('signup');
                });
            } else {
                footerText.innerHTML = 'لديك حساب بالفعل؟ <a href="#" id="switchToLogin">سجل الدخول</a>';
                document.getElementById('switchToLogin')?.addEventListener('click', function(e) {
                    e.preventDefault();
                    switchTab('login');
                });
            }
        }

        tabs.forEach(function(btn) {
            btn.addEventListener('click', function() {
                switchTab(btn.dataset.tab);
            });
        });

        switchTab('login');

        function showMessage(element, message, type) {
            type = type || 'error';
            var icons = { error: '❌', success: '✅', info: 'ℹ️' };
            element.className = 'message ' + type;
            element.innerHTML = '<span class="msg-icon">' + (icons[type] || '📌') + '</span> ' + message;
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ===== Login =====
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            loginMsg.className = 'message';
            loginMsg.textContent = '';

            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage(loginMsg, 'يرجى ملء جميع الحقول.', 'error');
                return;
            }
            if (!isValidEmail(email)) {
                showMessage(loginMsg, 'البريد الإلكتروني غير صحيح.', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage(loginMsg, 'كلمة المرور يجب أن تكون ٦ أحرف على الأقل.', 'error');
                return;
            }

            setLoading(loginBtn, true);

            try {
                if (!supabaseClient) {
                    showMessage(loginMsg, '⚠️ الخدمة غير متوفرة.', 'error');
                    setLoading(loginBtn, false);
                    return;
                }

                var result = await supabaseClient.auth.signInWithPassword({ email: email, password: password });
                if (result.error) throw result.error;

                if (result.data?.user) {
                    localStorage.setItem('devAcademicUser', JSON.stringify({ email: email, name: result.data.user
                            .user_metadata?.full_name || null }));
                    showMessage(loginMsg, 'تم تسجيل الدخول بنجاح، جارِ التوجيه...', 'success');
                    setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
                } else {
                    showMessage(loginMsg, 'حدث خطأ غير متوقع.', 'error');
                }
            } catch (err) {
                console.error('Login error:', err);
                if (err.message.includes('Invalid login credentials')) {
                    showMessage(loginMsg, 'البريد الإلكتروني أو كلمة المرور غير صحيحة.', 'error');
                } else if (err.message.includes('Email not confirmed')) {
                    showMessage(loginMsg, 'يرجى تأكيد بريدك الإلكتروني أولاً.', 'info');
                } else {
                    showMessage(loginMsg, (err.message || 'حدث خطأ، حاول مجدداً.'), 'error');
                }
            } finally {
                setLoading(loginBtn, false);
            }
        });

        // ===== Signup =====
        signupForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            signupMsg.className = 'message';
            signupMsg.textContent = '';

            var name = document.getElementById('signupName').value.trim();
            var email = document.getElementById('signupEmail').value.trim();
            var password = document.getElementById('signupPassword').value;

            if (!name || !email || !password) {
                showMessage(signupMsg, 'يرجى ملء جميع الحقول.', 'error');
                return;
            }
            if (name.length < 2) {
                showMessage(signupMsg, 'الاسم يجب أن يكون حرفين على الأقل.', 'error');
                return;
            }
            if (!isValidEmail(email)) {
                showMessage(signupMsg, 'البريد الإلكتروني غير صحيح.', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage(signupMsg, 'كلمة المرور يجب أن تكون ٦ أحرف على الأقل.', 'error');
                return;
            }

            setLoading(signupBtn, true);

            try {
                if (!supabaseClient) {
                    showMessage(signupMsg, '⚠️ الخدمة غير متوفرة.', 'error');
                    setLoading(signupBtn, false);
                    return;
                }

                var result = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { full_name: name } }
                });

                if (result.error) throw result.error;

                if (result.data?.user) {
                    localStorage.setItem('devAcademicUser', JSON.stringify({ email: email, name: name }));

                    if (result.data.user.confirmed_at === null) {
                        showMessage(signupMsg, 'تم إنشاء الحساب! يرجى تأكيد بريدك الإلكتروني.', 'info');
                    } else {
                        showMessage(signupMsg, 'تم إنشاء الحساب بنجاح! جارِ التوجيه...', 'success');
                        setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
                    }
                } else {
                    showMessage(signupMsg, 'حدث خطأ غير متوقع.', 'error');
                }
            } catch (err) {
                console.error('Signup error:', err);
                if (err.message.includes('User already registered')) {
                    showMessage(signupMsg, 'هذا البريد الإلكتروني مسجل بالفعل.', 'error');
                } else {
                    showMessage(signupMsg, (err.message || 'حدث خطأ، حاول مجدداً.'), 'error');
                }
            } finally {
                setLoading(signupBtn, false);
            }
        });

        // ===== Check Session =====
        (async function checkSession() {
            try {
                var storedUser = localStorage.getItem('devAcademicUser');
                if (!supabaseClient && storedUser) {
                    try {
                        var user = JSON.parse(storedUser);
                        if (user && user.email) {
                            window.location.href = 'dashboard.html';
                            return;
                        }
                    } catch (e) { localStorage.removeItem('devAcademicUser'); }
                    return;
                }
                if (!supabaseClient) return;
                var sessionResult = await supabaseClient.auth.getSession();
                if (sessionResult.data?.session?.user) {
                    window.location.href = 'dashboard.html';
                } else {
                    localStorage.removeItem('devAcademicUser');
                }
            } catch (_) {
                localStorage.removeItem('devAcademicUser');
            }
        })();

        // ===== Protection =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (e.key === 'S' || e.key === 's' || e.keyCode === 83)) {
                e.preventDefault();
                return false;
            }
            return true;
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        console.log('✅ ديف أكاديمي - جاهز');
    </script>
