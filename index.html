<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديف أكاديمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="p-8" dir="rtl">
    <h1 class="text-3xl font-bold text-blue-600 mb-4">📊 ديف أكاديمي</h1>
    
    <div id="result" class="p-4 bg-gray-100 rounded-lg">
        ⏳ جاري تحميل البيانات...
    </div>
    <div id="details" class="mt-4 p-4 bg-gray-50 rounded-lg text-sm"></div>
</div>

<script>
    const SUPABASE_URL = 'https://mgcljgrkxhyjjmxqjkti.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TE4fMQARKZb0XcjhAnEJhA_ws6AUxoi';
    
    const result = document.getElementById('result');
    const details = document.getElementById('details');
    
    async function loadData() {
        try {
            result.innerHTML = '🔑 جاري الاتصال بـ Supabase...';
            
            const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            result.innerHTML = '📊 جاري جلب المستخدمين...';
            
            const { data: users, error, status } = await sb.from('users').select('*');
            
            if (error) {
                result.innerHTML = '❌ فشل جلب البيانات';
                details.innerHTML = `
                    <div class="text-red-600">الخطأ: ${error.message}</div>
                    <div class="text-gray-600 mt-2">الحالة: ${status}</div>
                    <div class="mt-4 p-3 bg-yellow-50 rounded">
                        <strong>⚠️ الحل:</strong> اذهب إلى Supabase → SQL Editor وشغل:
                        <code class="block bg-gray-100 p-2 mt-2 rounded text-sm">
                        CREATE POLICY "users_select_all" ON public.users FOR SELECT USING (true);
                        </code>
                    </div>
                `;
                return;
            }
            
            if (!users || users.length === 0) {
                result.innerHTML = '⚠️ لا يوجد مستخدمين في قاعدة البيانات';
                details.innerHTML = `
                    <div class="text-gray-600">جدول users فارغ.</div>
                    <div class="mt-2 p-3 bg-yellow-50 rounded">
                        <strong>💡 أضف مستخدمين من خلال صفحة التسجيل.</strong>
                    </div>
                `;
                return;
            }
            
            result.innerHTML = `✅ تم جلب ${users.length} مستخدم بنجاح!`;
            
            let table = '<table class="w-full border mt-4"><thead class="bg-gray-100"><tr>';
            table += '<th class="p-2 border">#</th>';
            table += '<th class="p-2 border">الاسم</th>';
            table += '<th class="p-2 border">البريد</th>';
            table += '<th class="p-2 border">الهاتف</th>';
            table += '<th class="p-2 border">تاريخ التسجيل</th></tr></thead><tbody>';
            
            users.forEach((user, i) => {
                table += `<tr>
                    <td class="p-2 border">${i+1}</td>
                    <td class="p-2 border">${user.full_name || 'غير مسجل'}</td>
                    <td class="p-2 border">${user.email || '-'}</td>
                    <td class="p-2 border">${user.phone || 'غير مسجل'}</td>
                    <td class="p-2 border">${user.registered_at ? new Date(user.registered_at).toLocaleDateString('ar-EG') : '-'}</td>
                </tr>`;
            });
            table += '</tbody></table>';
            details.innerHTML = table;
            
        } catch (err) {
            result.innerHTML = '❌ حدث خطأ';
            details.innerHTML = `<div class="text-red-600">${err.message}</div>`;
        }
    }
    
    loadData();
</script>
</body>
</html>
